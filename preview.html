<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>自作指数ビルダー（オフライン・プレビュー）</title>
<style>:root{
  --bg:#0f1320; --panel:#171c2e; --panel2:#1d2336; --line:#2a3252;
  --ink:#e8ecf6; --mut:#9aa4c4; --mut2:#6b7596;
  --accent:#5b8cff; --accent2:#7c5cff;
  --up:#22c79a; --down:#ff5d6c; --warn:#f0b429;
  --shadow:0 6px 24px rgba(0,0,0,.32);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 600px at 80% -10%, #1a2140 0%, var(--bg) 55%);
  color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:14px; line-height:1.5; min-height:100vh;
}
h1,h2{margin:0}
button{font-family:inherit;cursor:pointer}
small{color:var(--mut)}

/* top bar */
.topbar{display:flex;justify-content:space-between;align-items:center;
  padding:14px 22px;border-bottom:1px solid var(--line);
  background:rgba(13,17,30,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
.brand{display:flex;gap:13px;align-items:center}
.logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
  font-weight:800;font-size:20px;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:var(--shadow)}
.topbar h1{font-size:18px;letter-spacing:.5px}
.tag{margin:1px 0 0;color:var(--mut);font-size:12px}
.badge{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid var(--line)}
.badge-ok{background:rgba(34,199,154,.12);color:var(--up);border-color:rgba(34,199,154,.35)}
.badge-warn{background:rgba(240,180,41,.12);color:var(--warn);border-color:rgba(240,180,41,.35)}

/* layout */
.layout{display:grid;grid-template-columns:340px 1fr;gap:20px;
  max-width:1500px;margin:0 auto;padding:20px}
.sidebar{display:flex;flex-direction:column;gap:14px}
.content{display:flex;flex-direction:column;gap:18px;min-width:0}

/* mode tabs */
.mode-tabs{display:flex;gap:6px;background:var(--panel);padding:6px;border-radius:12px;border:1px solid var(--line)}
.mode-tab{flex:1;padding:10px;border:0;border-radius:8px;background:transparent;color:var(--mut);font-weight:700;font-size:13.5px}
.mode-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:var(--shadow)}
.mode-desc{margin:-4px 2px 0;color:var(--mut);font-size:12px;min-height:16px}

/* panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.panel h2{font-size:13.5px;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.panel-head h2{margin:0}
.pill{background:var(--accent);color:#fff;border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
.mini-btns{display:flex;gap:5px}
.mini{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:7px;padding:4px 8px;font-size:11.5px}
.mini:hover{color:var(--ink);border-color:var(--accent)}

.search,.select,.amount-input input,.save-row input{
  width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:9px;padding:9px 11px;font-size:13px;outline:none}
.search:focus,.select:focus{border-color:var(--accent)}
.select{margin-top:8px;cursor:pointer}

/* stock list */
.stocklist{margin-top:10px;max-height:260px;overflow:auto;display:flex;flex-direction:column;gap:2px;padding-right:2px}
.stock-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer}
.stock-item:hover{background:var(--panel2)}
.stock-item input{accent-color:var(--accent);width:15px;height:15px}
.stock-item .code{color:var(--mut2);font-variant-numeric:tabular-nums;font-size:12px;min-width:38px}
.stock-item .nm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-item .sec{font-size:10.5px;color:var(--mut2);background:var(--panel);padding:1px 6px;border-radius:5px}

/* weighting */
.weights{display:flex;flex-direction:column;gap:7px}
.wopt{display:grid;grid-template-columns:18px 1fr;gap:4px 9px;align-items:start;
  padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);cursor:pointer}
.wopt input{grid-row:span 2;accent-color:var(--accent);margin-top:2px}
.wopt b{font-size:13px}
.wopt small{grid-column:2;font-size:11px;line-height:1.35}
.wopt:has(input:checked){border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.custom-panel{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow:auto}
.custom-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.custom-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.custom-row input{width:70px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:5px 7px;text-align:right}
.custom-row .pct{color:var(--mut);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ranges */
.range-row{display:grid;grid-template-columns:36px 1fr auto;gap:9px;align-items:center;margin-bottom:9px}
.range-row label{color:var(--mut);font-size:12px}
.range-row input[type=range]{accent-color:var(--accent)}
.rlabel{font-size:11.5px;color:var(--ink);font-variant-numeric:tabular-nums;min-width:64px;text-align:right}
.amount-row{margin-top:6px}
.amount-row label{display:block;color:var(--mut);font-size:12px;margin-bottom:6px}
.amount-input{display:flex;align-items:center;gap:8px}
.amount-input input{width:110px;text-align:right;font-variant-numeric:tabular-nums}
.amount-input span{color:var(--mut);font-size:12px}

/* save */
.save-row{display:flex;gap:7px}
.save-row input{flex:1}
.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff;border-radius:9px;font-weight:700}
.primary.small{padding:9px 14px;font-size:12.5px;white-space:nowrap}
.saved-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.saved-item{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px}
.saved-item .snm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.saved-item .snm:hover{color:var(--accent)}
.saved-item button{background:none;border:0;color:var(--mut2);font-size:14px;padding:0 2px}
.saved-item button:hover{color:var(--down)}

/* metric cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;position:relative;overflow:hidden}
.card::after{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--accent)}
.card.win::after{background:var(--up)} .card.lose::after{background:var(--down)}
.card .k{color:var(--mut);font-size:11.5px;margin-bottom:7px}
.card .v{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.card .sub{font-size:11.5px;color:var(--mut);margin-top:4px}
.up{color:var(--up)} .down{color:var(--down)}

/* chart */
.chart-card,.table-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.chart-head,.table-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.chart-head h2,.table-head h2{font-size:15px}
.legend-note{font-size:11.5px;color:var(--mut)}
.chart-head-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.unit-toggle{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px}
.unit-toggle button{border:0;background:transparent;color:var(--mut);font-size:12px;font-weight:700;padding:5px 11px;border-radius:6px;cursor:pointer}
.unit-toggle button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.compare-strip{display:flex;gap:10px;flex-wrap:wrap;margin:2px 0 14px}
.cmp{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 14px;min-width:128px}
.cmp .dot{width:10px;height:10px;border-radius:50%;background:var(--c);flex:none}
.cmp-body{display:flex;flex-direction:column;line-height:1.25}
.cmp-label{font-size:11.5px;color:var(--mut)}
.cmp-pct{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.cmp-sub{font-size:11px;color:var(--mut2);font-variant-numeric:tabular-nums}
.stat-line{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--mut)}
.stat-line span b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;margin-left:5px}
.chart-wrap{position:relative;height:380px}

/* table */
.table-scroll{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--panel);text-align:right;color:var(--mut);font-weight:700;
  padding:9px 10px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
thead th:first-child,tbody td:first-child{text-align:left}
thead th.s-asc::after{content:" ▲";color:var(--accent)}
thead th.s-desc::after{content:" ▼";color:var(--accent)}
tbody td{padding:8px 10px;border-bottom:1px solid rgba(42,50,82,.5);text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--panel2)}
.bar{height:6px;border-radius:3px;background:var(--accent);display:inline-block;vertical-align:middle;margin-left:6px}

.hint{font-size:11px;color:var(--mut2)}
.disclaimer{font-size:11px;color:var(--mut2);line-height:1.6;margin:4px 2px 24px}
.hidden{display:none!important}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--accent);color:var(--ink);
  padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);z-index:50;font-size:13px}

/* responsive */
@media(max-width:980px){
  .layout{grid-template-columns:1fr}
  .sidebar{order:2}
  .chart-wrap{height:320px}
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--mut2)}
</style>
</head><body>

<header class="topbar">
  <div class="brand">
    <span class="logo">指</span>
    <div>
      <h1>自作指数ビルダー</h1>
      <p class="tag">日本株を組み合わせて、日経225を超える"最強指数"を探す</p>
    </div>
  </div>
  <div class="topbar-right">
    <span id="dataBadge" class="badge badge-warn">データ読込中…</span>
  </div>
</header>

<main class="layout">
  <!-- ============ サイドバー（操作パネル）============ -->
  <aside class="sidebar">
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="dca">積立モード</button>
      <button class="mode-tab" data-mode="index">指数モード</button>
    </div>
    <p class="mode-desc" id="modeDesc"></p>

    <section class="panel">
      <div class="panel-head">
        <h2>① 銘柄を選ぶ <span id="selCount" class="pill">0</span></h2>
        <div class="mini-btns">
          <button id="btnAll" class="mini">全</button>
          <button id="btnTop10" class="mini">主要10</button>
          <button id="btnClear" class="mini">解除</button>
        </div>
      </div>
      <input id="search" class="search" type="search" placeholder="銘柄名・コードで検索（例: トヨタ / 7203）" />
      <select id="sectorFilter" class="select"><option value="">全業種</option></select>
      <div id="stockList" class="stocklist"></div>
    </section>

    <section class="panel">
      <h2>② 加重方式</h2>
      <div class="weights" id="weightMethods">
        <label class="wopt"><input type="radio" name="wm" value="equal" checked /><b>均等加重</b><small>全銘柄に同額。中小型を拾え、日経超えの本命</small></label>
        <label class="wopt"><input type="radio" name="wm" value="price" /><b>株価加重</b><small>株価が高い銘柄ほど多く。日経225と同じ方式</small></label>
        <label class="wopt"><input type="radio" name="wm" value="mktcap" /><b>時価総額加重</b><small>大型株ほど多く。TOPIX型（発行株数は概算）</small></label>
        <label class="wopt"><input type="radio" name="wm" value="custom" /><b>カスタム比率</b><small>銘柄ごとに配分を自分で指定</small></label>
      </div>
      <div id="customPanel" class="custom-panel hidden"></div>
    </section>

    <section class="panel">
      <h2>③ 期間と積立額</h2>
      <div class="range-row">
        <label>開始</label>
        <input type="range" id="startRange" min="0" max="100" value="0" />
        <span id="startLabel" class="rlabel"></span>
      </div>
      <div class="range-row">
        <label>終了</label>
        <input type="range" id="endRange" min="0" max="100" value="100" />
        <span id="endLabel" class="rlabel"></span>
      </div>
      <div class="amount-row" id="amountRow">
        <label>毎日の積立額</label>
        <div class="amount-input">
          <input type="number" id="dailyAmount" value="100" min="1" step="10" />
          <span>円 / 営業日</span>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>④ この指数を保存</h2>
      <div class="save-row">
        <input id="saveName" class="search" type="text" placeholder="指数名（例: 中小型グロース）" />
        <button id="btnSave" class="primary small">保存</button>
      </div>
      <div id="savedList" class="saved-list"></div>
    </section>
  </aside>

  <!-- ============ メイン（結果）============ -->
  <section class="content">
    <div class="chart-card">
      <div class="chart-head">
        <h2 id="chartTitle">資産推移</h2>
        <div class="chart-head-right">
          <div class="unit-toggle" id="unitToggle">
            <button data-unit="pct" class="active">リターン%</button>
            <button data-unit="abs">資産額</button>
          </div>
          <span id="chartLegendNote" class="legend-note"></span>
        </div>
      </div>
      <div id="compareStrip" class="compare-strip"></div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      <div id="statLine" class="stat-line"></div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <h2>構成銘柄の内訳</h2>
        <div class="table-tools">
          <span class="hint">列見出しクリックで並び替え</span>
        </div>
      </div>
      <div class="table-scroll">
        <table id="constTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <p class="disclaimer" id="disclaimer"></p>
  </section>
</main>

<div id="toast" class="toast hidden"></div>

<script>/*
 * engine.js — 指数/積立シミュレーションの純粋計算部（DOM非依存）。
 * ブラウザでは window.Engine、Node では require('./engine.js') で使える（UMD）。
 * ここに副作用は置かない。テスト(verify.cjs)はこのファイルを直接importして検証する。
 */
(function (root) {
  "use strict";

  // ---- 小道具 -----------------------------------------------------------
  function priceAt(data, code, t) {
    const v = data.stocks[code].close[t];
    return (v === null || v === undefined || v <= 0) ? null : v;
  }

  // ある日 t に有効な（株価が取れる）銘柄だけ返す
  function availableCodes(data, codes, t) {
    return codes.filter((c) => priceAt(data, c, t) !== null);
  }

  // 目標ウェイト（合計1）。method: 'equal' | 'price' | 'mktcap' | 'custom'
  // pricesT: その日の {code: price}, custom: {code: weight}
  function targetWeights(method, codes, pricesT, sharesMap, custom) {
    const raw = {};
    let sum = 0;
    for (const c of codes) {
      let w;
      if (method === "equal") w = 1;
      else if (method === "price") w = pricesT[c];
      else if (method === "mktcap") w = pricesT[c] * (sharesMap[c] || 0);
      else if (method === "custom") w = Math.max(0, (custom && custom[c]) || 0);
      else w = 1;
      raw[c] = w;
      sum += w;
    }
    const out = {};
    if (sum <= 0) {
      // 全部0（カスタムで未指定など）→ 均等にフォールバック
      for (const c of codes) out[c] = 1 / codes.length;
      return out;
    }
    for (const c of codes) out[c] = raw[c] / sum;
    return out;
  }

  // ---- 指数モード：毎日リバランスする加重リターン指数（始点=100）---------
  // 各ベンチ（日経225・S&P500…）も同じ始点=100に正規化して比較。
  function computeIndexSeries(data, codes, method, custom, i0, i1) {
    const dates = data.dates.slice(i0, i1 + 1);
    const bl = benchmarksOf(data);
    const level = [100];
    const benchLv = bl.map(() => [100]);
    const shMap = sharesMapOf(data);
    for (let t = i0 + 1; t <= i1; t++) {
      // 前日 t-1 の価格で目標ウェイトを決め、t のリターンを取る（両日とも価格がある銘柄のみ）
      const valid = codes.filter(
        (c) => priceAt(data, c, t - 1) !== null && priceAt(data, c, t) !== null
      );
      let ret = 0;
      if (valid.length) {
        const pPrev = {};
        for (const c of valid) pPrev[c] = priceAt(data, c, t - 1);
        const w = targetWeights(method, valid, pPrev, shMap, custom);
        for (const c of valid) {
          const r = priceAt(data, c, t) / priceAt(data, c, t - 1) - 1;
          ret += w[c] * r;
        }
      }
      level.push(level[level.length - 1] * (1 + ret));
      bl.forEach((b, k) => {
        const br = b.close[t] && b.close[t - 1] ? b.close[t] / b.close[t - 1] - 1 : 0;
        benchLv[k].push(benchLv[k][benchLv[k].length - 1] * (1 + br));
      });
    }
    const benches = bl.map((b, k) => ({ sym: b.sym, name: b.name, level: benchLv[k] }));
    return { dates, level, benches };
  }

  // ---- 積立モード：毎日 daily 円を目標ウェイトで購入（DCA）---------------
  function computeDCASeries(data, codes, method, custom, daily, i0, i1) {
    const dates = data.dates.slice(i0, i1 + 1);
    const bl = benchmarksOf(data);
    const sharesHeld = {};
    const investedInCode = {};
    for (const c of codes) {
      sharesHeld[c] = 0;
      investedInCode[c] = 0;
    }
    const benchUnits = bl.map(() => 0);
    const benchAssetsArr = bl.map(() => []);
    let invested = 0;
    const asset = [];
    const investedArr = [];
    const shMap = sharesMapOf(data);

    for (let t = i0; t <= i1; t++) {
      const valid = availableCodes(data, codes, t);
      const pricesT = {};
      for (const c of valid) pricesT[c] = priceAt(data, c, t);
      const w = targetWeights(method, valid, pricesT, shMap, custom);
      for (const c of valid) {
        const amt = daily * w[c];
        sharesHeld[c] += amt / pricesT[c];
        investedInCode[c] += amt;
      }
      invested += daily;
      bl.forEach((b, k) => { if (b.close[t]) benchUnits[k] += daily / b.close[t]; });

      let v = 0;
      for (const c of codes) {
        const p = priceAt(data, c, t);
        if (p !== null) v += sharesHeld[c] * p;
      }
      asset.push(v);
      investedArr.push(invested);
      bl.forEach((b, k) => benchAssetsArr[k].push(benchUnits[k] * (b.close[t] || 0)));
    }
    const benchAssets = bl.map((b, k) => ({ sym: b.sym, name: b.name, asset: benchAssetsArr[k] }));

    // 銘柄ごとの最終内訳
    const perStock = codes.map((c) => {
      const p = priceAt(data, c, i1);
      const sh = sharesHeld[c];
      const inv = investedInCode[c];
      const value = p !== null ? sh * p : 0;
      return {
        code: c,
        name: data.stocks[c].name,
        sector: data.stocks[c].sector,
        invested: inv,          // 累計投資額（このカスタム比率で毎日積んだ合計）
        shares: sh,             // 保有株数（端株あり）
        price: p,               // 現在値
        avgCost: sh > 0 ? inv / sh : 0,   // 取得単価＝投資額÷株数（DCA平均）
        value,                  // 評価額＝株数×現在値
        pl: value - inv,        // 含み損益
        ret: inv > 0 ? value / inv - 1 : 0, // 損益率＝現在値/取得単価−1 と同じ
      };
    });

    return { dates, asset, invested: investedArr, benchAssets, perStock };
  }

  // ---- 指標 -------------------------------------------------------------
  function maxDrawdown(series) {
    let peak = -Infinity, mdd = 0, peakIdx = 0, troughIdx = 0, curPeak = 0;
    for (let i = 0; i < series.length; i++) {
      const v = series[i];
      if (v > peak) { peak = v; curPeak = i; }
      const dd = (v - peak) / peak;
      if (dd < mdd) { mdd = dd; peakIdx = curPeak; troughIdx = i; }
    }
    return { mdd, peakIdx, troughIdx };
  }

  function cagr(first, last, nDays) {
    if (first <= 0 || nDays <= 1) return 0;
    return Math.pow(last / first, 252 / (nDays - 1)) - 1;
  }

  function annualVol(level) {
    const rets = [];
    for (let i = 1; i < level.length; i++) rets.push(level[i] / level[i - 1] - 1);
    if (rets.length < 2) return 0;
    const m = rets.reduce((a, b) => a + b, 0) / rets.length;
    const v = rets.reduce((a, b) => a + (b - m) * (b - m), 0) / (rets.length - 1);
    return Math.sqrt(v) * Math.sqrt(252);
  }

  // 積立の年率リターン（資金加重・IRR）。毎日 -daily、最終日に +finalValue。
  function irrAnnual(daily, finalValue, n) {
    if (finalValue <= 0 || n < 2) return 0;
    const npv = (r) => {
      let s = 0;
      for (let t = 0; t < n; t++) s += -daily / Math.pow(1 + r, t);
      s += finalValue / Math.pow(1 + r, n - 1);
      return s;
    };
    let lo = -0.5, hi = 0.5; // 日次レート
    if (npv(lo) < 0 && npv(hi) < 0) return -1;
    for (let i = 0; i < 200; i++) {
      const mid = (lo + hi) / 2;
      const val = npv(mid);
      if (Math.abs(val) < 1e-6) { lo = hi = mid; break; }
      if (val > 0) lo = mid; else hi = mid;
    }
    const rDaily = (lo + hi) / 2;
    return Math.pow(1 + rDaily, 252) - 1;
  }

  // ---- 内部 -------------------------------------------------------------
  function sharesMapOf(data) {
    const m = {};
    for (const c in data.stocks) m[c] = data.stocks[c].shares || 0;
    return m;
  }

  // ベンチマーク一覧を取り出す（新スキーマ benchmarks{} / 旧 benchmark{} 両対応）
  function benchmarksOf(data) {
    if (data.benchmarks) {
      return Object.keys(data.benchmarks).map((sym) => ({
        sym, name: data.benchmarks[sym].name, close: data.benchmarks[sym].close,
      }));
    }
    if (data.benchmark) {
      return [{ sym: data.benchmark.symbol, name: data.benchmark.name, close: data.benchmark.close }];
    }
    return [];
  }

  const Engine = {
    priceAt, availableCodes, targetWeights, benchmarksOf,
    computeIndexSeries, computeDCASeries,
    maxDrawdown, cagr, annualVol, irrAnnual,
  };

  if (typeof module !== "undefined" && module.exports) module.exports = Engine;
  root.Engine = Engine;
})(typeof globalThis !== "undefined" ? globalThis : this);
</script>
<script>/* app.js — UI制御。engine.js(window.Engine) と Chart.js を使う。 */
(function () {
  "use strict";
  const $ = (s) => document.querySelector(s);
  const TOP10 = ["7203", "6758", "6861", "9984", "8306", "9983", "6098", "8035", "9432", "8058"];
  const MODE_DESC = {
    dca: "毎日◯円ずつ買い続けたら資産がどう増えるか（積立／ドルコスト平均法）。同額を日経225に積立した場合と比較します。",
    index: "選んだ銘柄を毎日リバランスした株価指数（始点=100）。日経225の指数水準と比較します。",
  };

  const state = {
    data: null,
    selected: new Set(),
    method: "equal",
    custom: {},        // {code: 相対ウェイト}
    i0: 0, i1: 0,
    daily: 100,
    mode: "dca",
    unit: "pct",   // チャートの単位: 'pct'(リターン% ＝デフォルト) | 'abs'(資産額/指数)
  };
  let chart = null;
  let rafId = null;

  // ---------- 起動 ----------
  // 単体プレビュー(preview.html)では window.__PRICES__ に直接データを埋め込む。
  // 通常(GitHub Pages)は data/prices.json を取得する。
  if (window.__PRICES__) {
    init(window.__PRICES__);
  } else {
    fetch("data/prices.json", { cache: "no-store" })
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then((d) => init(d))
      .catch((e) => {
        $("#dataBadge").textContent = "データ読込失敗: data/prices.json";
        $("#dataBadge").className = "badge badge-warn";
        console.error(e);
      });
  }

  function init(data) {
    state.data = data;
    state.i0 = 0; state.i1 = data.dates.length - 1;

    // データバッジ
    const badge = $("#dataBadge");
    if (data.source && data.source !== "SAMPLE") {
      const srcName = { yahoo: "Yahoo Finance", stooq: "stooq" }[data.source] || data.source;
      badge.textContent = `実データ ${srcName}・${data.end} 時点`;
      badge.className = "badge badge-ok";
    } else {
      badge.textContent = "サンプルデータ（実データは fetch_data.py で取得）";
      badge.className = "badge badge-warn";
    }

    buildSectorFilter();
    buildStockList();
    buildRanges();

    // デフォルト選択：主要10・均等
    TOP10.forEach((c) => { if (data.stocks[c]) state.selected.add(c); });
    syncCheckboxes();
    updateSelCount();

    wireEvents();
    renderModeUI();
    renderSaved();
    $("#disclaimer").innerHTML =
      "※ 配当・売買手数料・税金は考慮していません。積立は終値で端株購入できる前提の簡易シミュレーションです。" +
      "S&P500は現地通貨(USD)の指数水準で比較し、為替(USD/JPY)は考慮していません。" +
      "時価総額加重の発行済株式数は概算値です。本ツールは情報提供のみを目的とし、投資勧誘・助言ではありません。投資判断はご自身の責任で。";
    schedule();
  }

  // ---------- 銘柄リスト ----------
  function buildSectorFilter() {
    const secs = [...new Set(Object.values(state.data.stocks).map((s) => s.sector))].sort();
    const sel = $("#sectorFilter");
    secs.forEach((s) => {
      const o = document.createElement("option"); o.value = s; o.textContent = s; sel.appendChild(o);
    });
  }

  function buildStockList() {
    const list = $("#stockList");
    list.innerHTML = "";
    const q = $("#search").value.trim().toLowerCase();
    const sec = $("#sectorFilter").value;
    const codes = Object.keys(state.data.stocks).sort();
    for (const c of codes) {
      const s = state.data.stocks[c];
      if (sec && s.sector !== sec) continue;
      if (q && !(c.includes(q) || s.name.toLowerCase().includes(q))) continue;
      const row = document.createElement("label");
      row.className = "stock-item";
      row.innerHTML =
        `<input type="checkbox" data-code="${c}" ${state.selected.has(c) ? "checked" : ""}/>` +
        `<span class="code">${c}</span><span class="nm">${s.name}</span>` +
        `<span class="sec">${s.sector}</span>`;
      list.appendChild(row);
    }
    list.querySelectorAll("input").forEach((cb) =>
      cb.addEventListener("change", (e) => {
        const c = e.target.dataset.code;
        if (e.target.checked) state.selected.add(c); else state.selected.delete(c);
        updateSelCount(); renderCustomPanel(); schedule();
      })
    );
  }

  function syncCheckboxes() {
    document.querySelectorAll('#stockList input[data-code]').forEach((cb) => {
      cb.checked = state.selected.has(cb.dataset.code);
    });
  }
  function updateSelCount() { $("#selCount").textContent = state.selected.size; }

  // ---------- 期間スライダー ----------
  function buildRanges() {
    const n = state.data.dates.length;
    const sr = $("#startRange"), er = $("#endRange");
    sr.max = er.max = n - 1; sr.value = 0; er.value = n - 1;
    updateRangeLabels();
  }
  function updateRangeLabels() {
    $("#startLabel").textContent = state.data.dates[state.i0];
    $("#endLabel").textContent = state.data.dates[state.i1];
  }

  // ---------- カスタム比率 ----------
  function renderCustomPanel() {
    const panel = $("#customPanel");
    if (state.method !== "custom") { panel.classList.add("hidden"); return; }
    panel.classList.remove("hidden");
    panel.innerHTML = "";
    const codes = [...state.selected];
    if (!codes.length) { panel.innerHTML = '<small>銘柄を選ぶと比率を設定できます</small>'; return; }
    const note = document.createElement("small");
    note.style.cssText = "color:var(--mut);display:block;margin-bottom:6px;line-height:1.45";
    note.textContent = "比率＝毎日の買付金額の配分。取得単価はこの比率で平均化され、評価額の構成比は値動きでズレます。";
    panel.appendChild(note);
    const total = codes.reduce((a, c) => a + (state.custom[c] || 1), 0);
    codes.forEach((c) => {
      if (state.custom[c] == null) state.custom[c] = 1;
      const pct = ((state.custom[c] || 0) / total * 100).toFixed(1);
      const row = document.createElement("div");
      row.className = "custom-row";
      row.innerHTML = `<span class="nm">${state.data.stocks[c].name}</span>` +
        `<input type="number" min="0" step="0.5" value="${state.custom[c]}" data-code="${c}"/>` +
        `<span class="pct">${pct}%</span>`;
      panel.appendChild(row);
    });
    panel.querySelectorAll("input").forEach((inp) =>
      inp.addEventListener("input", (e) => {
        state.custom[e.target.dataset.code] = parseFloat(e.target.value) || 0;
        renderCustomPanel(); schedule();
      })
    );
  }

  // ---------- イベント ----------
  function wireEvents() {
    $("#search").addEventListener("input", buildStockList);
    $("#sectorFilter").addEventListener("change", buildStockList);
    $("#btnAll").addEventListener("click", () => {
      Object.keys(state.data.stocks).forEach((c) => state.selected.add(c));
      syncCheckboxes(); updateSelCount(); renderCustomPanel(); schedule();
    });
    $("#btnTop10").addEventListener("click", () => {
      state.selected = new Set(TOP10.filter((c) => state.data.stocks[c]));
      buildStockList(); updateSelCount(); renderCustomPanel(); schedule();
    });
    $("#btnClear").addEventListener("click", () => {
      state.selected.clear(); syncCheckboxes(); updateSelCount(); renderCustomPanel(); schedule();
    });
    document.querySelectorAll('input[name="wm"]').forEach((r) =>
      r.addEventListener("change", (e) => { state.method = e.target.value; renderCustomPanel(); schedule(); })
    );
    $("#startRange").addEventListener("input", (e) => {
      state.i0 = Math.min(+e.target.value, state.i1 - 1); e.target.value = state.i0;
      updateRangeLabels(); schedule();
    });
    $("#endRange").addEventListener("input", (e) => {
      state.i1 = Math.max(+e.target.value, state.i0 + 1); e.target.value = state.i1;
      updateRangeLabels(); schedule();
    });
    $("#dailyAmount").addEventListener("input", (e) => {
      state.daily = Math.max(1, +e.target.value || 1); schedule();
    });
    document.querySelectorAll(".mode-tab").forEach((t) =>
      t.addEventListener("click", () => {
        document.querySelectorAll(".mode-tab").forEach((x) => x.classList.remove("active"));
        t.classList.add("active"); state.mode = t.dataset.mode; renderModeUI(); schedule();
      })
    );
    document.querySelectorAll("#unitToggle button").forEach((b) =>
      b.addEventListener("click", () => {
        state.unit = b.dataset.unit;
        document.querySelectorAll("#unitToggle button").forEach((x) => x.classList.toggle("active", x === b));
        schedule();
      })
    );
    $("#btnSave").addEventListener("click", saveCurrent);
  }

  function renderModeUI() {
    $("#modeDesc").textContent = MODE_DESC[state.mode];
    $("#amountRow").style.display = state.mode === "dca" ? "" : "none";
    $("#chartTitle").textContent = state.mode === "dca" ? "資産推移（毎日積立）" : "指数の推移（始点=100）";
    const absBtn = document.querySelector('#unitToggle button[data-unit="abs"]');
    if (absBtn) absBtn.textContent = state.mode === "dca" ? "資産額" : "指数(100)";
  }

  // ---------- 計算＆描画（デバウンス） ----------
  function schedule() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(run);
  }

  const SELF_COLOR = "--accent";
  const BENCH_COLORS = ["--warn", "--accent2", "--up", "--down"]; // 日経=amber, S&P=purple…

  function run() {
    const E = window.Engine;
    const codes = [...state.selected].filter((c) => state.data.stocks[c]);
    if (!codes.length) { renderEmpty(); return; }
    const { i0, i1, method, custom, daily, mode, unit } = state;

    if (mode === "dca") {
      const dca = E.computeDCASeries(state.data, codes, method, custom, daily, i0, i1);
      const n = i1 - i0 + 1;
      const inv = dca.invested;
      const finalAsset = dca.asset[n - 1];
      const invested = inv[n - 1];
      const plPct = invested > 0 ? finalAsset / invested - 1 : 0;
      const irr = E.irrAnnual(daily, finalAsset, n);
      const mdd = E.maxDrawdown(dca.asset).mdd;

      // 比較チップ（＝チャートの各ライン。これが「全部一括の＋ー」）
      const chips = [{ label: "自作指数", color: cssVar(SELF_COLOR), pct: plPct, sub: yen(finalAsset) }];
      dca.benchAssets.forEach((b, k) => {
        const bPct = invested > 0 ? b.asset[n - 1] / invested - 1 : 0;
        chips.push({ label: b.name, color: cssVar(BENCH_COLORS[k % BENCH_COLORS.length]), pct: bPct, sub: ppGap(plPct - bPct) });
      });
      renderCompare(chips);
      renderStatLine([
        ["投資元本", yen(invested)], ["最終資産", yen(finalAsset)],
        ["年率IRR", signPct(irr)], ["最大DD", pct(mdd)], ["期間", `${n.toLocaleString()}営業日`],
      ]);

      let datasets, yFmt, note;
      if (unit === "pct") {
        const toPct = (arr) => arr.map((v, i) => (inv[i] > 0 ? (v / inv[i] - 1) * 100 : 0));
        datasets = [line("自作指数", toPct(dca.asset), SELF_COLOR, false)];
        dca.benchAssets.forEach((b, k) => datasets.push(line(b.name, toPct(b.asset), BENCH_COLORS[k % BENCH_COLORS.length], false)));
        yFmt = (v) => (v >= 0 ? "+" : "") + v.toFixed(0) + "%";
        note = "元本に対するリターン％（全部 同じ毎日積立で比較）";
      } else {
        datasets = [line("自作指数の資産", dca.asset, SELF_COLOR, false), line("投資元本", dca.invested, "--mut2", true)];
        dca.benchAssets.forEach((b, k) => datasets.push(line(`${b.name}に積立`, b.asset, BENCH_COLORS[k % BENCH_COLORS.length], false)));
        yFmt = (v) => yenShort(v);
        note = "実線=評価額／点線=元本";
      }
      drawChart(dca.dates, datasets, yFmt);
      $("#chartLegendNote").textContent = note;
      renderTableDCA(dca, finalAsset);
    } else {
      const idx = E.computeIndexSeries(state.data, codes, method, custom, i0, i1);
      const n = i1 - i0 + 1;
      const lvl = idx.level[idx.level.length - 1];
      const totRet = lvl / 100 - 1;
      const cagr = E.cagr(100, lvl, n);
      const vol = E.annualVol(idx.level);
      const mdd = E.maxDrawdown(idx.level).mdd;

      const chips = [{ label: "自作指数", color: cssVar(SELF_COLOR), pct: totRet, sub: `指数 ${lvl.toFixed(1)}` }];
      idx.benches.forEach((b, k) => {
        const bRet = b.level[b.level.length - 1] / 100 - 1;
        chips.push({ label: b.name, color: cssVar(BENCH_COLORS[k % BENCH_COLORS.length]), pct: bRet, sub: ppGap(totRet - bRet) });
      });
      renderCompare(chips);
      renderStatLine([
        ["年率CAGR", signPct(cagr)], ["年率ボラ", pct(vol)], ["最大DD", pct(mdd)], ["期間", `${n.toLocaleString()}営業日`],
      ]);

      let datasets, yFmt, note;
      if (unit === "pct") {
        const toPct = (arr) => arr.map((v) => v - 100);
        datasets = [line("自作指数", toPct(idx.level), SELF_COLOR, false)];
        idx.benches.forEach((b, k) => datasets.push(line(b.name, toPct(b.level), BENCH_COLORS[k % BENCH_COLORS.length], false)));
        yFmt = (v) => (v >= 0 ? "+" : "") + v.toFixed(0) + "%";
        note = "始点からのリターン％";
      } else {
        datasets = [line("自作指数", idx.level, SELF_COLOR, false)];
        idx.benches.forEach((b, k) => datasets.push(line(b.name, b.level, BENCH_COLORS[k % BENCH_COLORS.length], false)));
        yFmt = (v) => v.toFixed(0);
        note = "始点=100に正規化";
      }
      drawChart(idx.dates, datasets, yFmt);
      $("#chartLegendNote").textContent = note;
      renderTableIndex(codes);
    }
  }

  // 自作との差を「+◯%pt / −◯%pt」で
  function ppGap(d) { return "自作と " + (d >= 0 ? "+" : "−") + Math.abs(d * 100).toFixed(1) + "%pt"; }

  function renderEmpty() {
    $("#compareStrip").innerHTML = '<div class="cmp"><span class="dot" style="--c:var(--mut2)"></span><div class="cmp-body"><span class="cmp-label">銘柄未選択</span><span class="cmp-sub">左で銘柄を選んでください</span></div></div>';
    $("#statLine").innerHTML = "";
    $("#constTable").querySelector("thead").innerHTML = "";
    $("#constTable").querySelector("tbody").innerHTML = "";
    if (chart) { chart.destroy(); chart = null; }
  }

  // ---------- 比較チップ＆統計行（カードの代わり） ----------
  function renderCompare(items) {
    $("#compareStrip").innerHTML = items.map((it) =>
      `<div class="cmp"><span class="dot" style="--c:${it.color}"></span>` +
      `<div class="cmp-body"><span class="cmp-label">${it.label}</span>` +
      `<span class="cmp-pct ${it.pct >= 0 ? "up" : "down"}">${signPct(it.pct)}</span>` +
      `<span class="cmp-sub">${it.sub || ""}</span></div></div>`
    ).join("");
  }
  function renderStatLine(pairs) {
    $("#statLine").innerHTML = pairs.map(([k, v]) => `<span>${k}<b>${v}</b></span>`).join("");
  }

  // ---------- チャート ----------
  function cssVar(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }
  function line(label, data, varName, dashed) {
    return { label, data, color: cssVar(varName), dashed };
  }
  function drawChart(dates, lines, yFmt) {
    const ctx = $("#mainChart");
    const datasets = lines.map((l) => ({
      label: l.label, data: l.data, borderColor: l.color,
      backgroundColor: l.color + "22",
      borderWidth: l.dashed ? 1.5 : 2, borderDash: l.dashed ? [5, 4] : [],
      pointRadius: 0, tension: 0.08, fill: false,
    }));
    const opts = {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { labels: { color: cssVar("--mut"), boxWidth: 14, font: { size: 12 } } },
        tooltip: {
          callbacks: {
            title: (it) => dates[it[0].dataIndex],
            label: (it) => `${it.dataset.label}: ${yFmt(it.parsed.y)}`,
          },
        },
      },
      scales: {
        x: { ticks: { color: cssVar("--mut2"), maxTicksLimit: 8, autoSkip: true }, grid: { color: "rgba(42,50,82,.35)" } },
        y: { ticks: { color: cssVar("--mut2"), callback: yFmt }, grid: { color: "rgba(42,50,82,.35)" } },
      },
    };
    if (chart) { chart.data.labels = dates; chart.data.datasets = datasets; chart.options = opts; chart.update(); }
    else chart = new Chart(ctx, { type: "line", data: { labels: dates, datasets }, options: opts });
  }

  // ---------- テーブル ----------
  let sortKey = "value", sortDir = -1;
  function renderTableDCA(dca, total) {
    const rows = dca.perStock.filter((r) => state.selected.has(r.code));
    const cols = [
      ["code", "コード"], ["name", "銘柄"],
      ["invested", "投資額"], ["avgCost", "取得単価"], ["value", "評価額"],
      ["pl", "含み損益"], ["ret", "損益率"], ["weight", "評価額比"],
    ];
    rows.forEach((r) => (r.weight = total > 0 ? r.value / total : 0));
    sortRows(rows);
    const thead = cols.map(([k, lbl]) =>
      `<th data-k="${k}" class="${sortKey === k ? (sortDir < 0 ? "s-desc" : "s-asc") : ""}">${lbl}</th>`).join("");
    $("#constTable").querySelector("thead").innerHTML = `<tr>${thead}</tr>`;
    const maxW = Math.max(...rows.map((r) => r.weight), 0.0001);
    $("#constTable").querySelector("tbody").innerHTML = rows.map((r) =>
      `<tr><td class="code">${r.code}</td><td style="text-align:left">${r.name}</td>` +
      `<td>${yen(r.invested)}</td><td>${yen(r.avgCost)}</td><td>${yen(r.value)}</td>` +
      `<td class="${r.pl >= 0 ? "up" : "down"}">${signYen(r.pl)}</td>` +
      `<td class="${r.ret >= 0 ? "up" : "down"}">${signPct(r.ret)}</td>` +
      `<td>${(r.weight * 100).toFixed(1)}%<span class="bar" style="width:${(r.weight / maxW * 46).toFixed(0)}px"></span></td></tr>`
    ).join("");
    wireSort(() => renderTableDCA(dca, total));
  }

  function renderTableIndex(codes) {
    const E = window.Engine, d = state.data, i0 = state.i0, i1 = state.i1;
    const pricesT = {}; const sh = {};
    codes.forEach((c) => { pricesT[c] = E.priceAt(d, c, i1); sh[c] = d.stocks[c].shares; });
    const w = E.targetWeights(state.method, codes, pricesT, sh, state.custom);
    const rows = codes.map((c) => {
      const p0 = E.priceAt(d, c, i0), p1 = E.priceAt(d, c, i1);
      return {
        code: c, name: d.stocks[c].name, sector: d.stocks[c].sector,
        weight: w[c] || 0, ret: p0 && p1 ? p1 / p0 - 1 : 0,
      };
    });
    const cols = [["code", "コード"], ["name", "銘柄"], ["sector", "業種"], ["weight", "目標ウェイト"], ["ret", "期間リターン"]];
    sortRows(rows);
    const thead = cols.map(([k, lbl]) =>
      `<th data-k="${k}" class="${sortKey === k ? (sortDir < 0 ? "s-desc" : "s-asc") : ""}">${lbl}</th>`).join("");
    $("#constTable").querySelector("thead").innerHTML = `<tr>${thead}</tr>`;
    const maxW = Math.max(...rows.map((r) => r.weight), 0.0001);
    $("#constTable").querySelector("tbody").innerHTML = rows.map((r) =>
      `<tr><td class="code">${r.code}</td><td style="text-align:left">${r.name}</td><td style="text-align:left"><span class="sec">${r.sector}</span></td>` +
      `<td>${(r.weight * 100).toFixed(1)}%<span class="bar" style="width:${(r.weight / maxW * 46).toFixed(0)}px"></span></td>` +
      `<td class="${r.ret >= 0 ? "up" : "down"}">${signPct(r.ret)}</td></tr>`
    ).join("");
    wireSort(() => renderTableIndex(codes));
  }

  function sortRows(rows) {
    rows.sort((a, b) => {
      let x = a[sortKey], y = b[sortKey];
      if (typeof x === "string") return sortDir * x.localeCompare(y, "ja");
      return sortDir * ((x || 0) - (y || 0));
    });
  }
  function wireSort(rerender) {
    $("#constTable").querySelectorAll("thead th").forEach((th) =>
      th.addEventListener("click", () => {
        const k = th.dataset.k;
        if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
        rerender();
      })
    );
  }

  // ---------- 保存/呼び出し ----------
  const LS = "jpidx.saved.v1";
  function loadSaved() { try { return JSON.parse(localStorage.getItem(LS)) || []; } catch { return []; } }
  function saveCurrent() {
    const name = $("#saveName").value.trim() || `指数 ${new Date().toLocaleDateString("ja")}`;
    const items = loadSaved();
    items.unshift({
      name, codes: [...state.selected], method: state.method,
      custom: { ...state.custom }, daily: state.daily, mode: state.mode,
    });
    localStorage.setItem(LS, JSON.stringify(items.slice(0, 30)));
    $("#saveName").value = ""; renderSaved(); toast(`「${name}」を保存しました`);
  }
  function renderSaved() {
    const items = loadSaved();
    const el = $("#savedList");
    if (!items.length) { el.innerHTML = '<small>保存した指数がここに並びます</small>'; return; }
    el.innerHTML = "";
    items.forEach((it, i) => {
      const row = document.createElement("div");
      row.className = "saved-item";
      row.innerHTML = `<span class="snm" title="呼び出す">${it.name}</span><small>${it.codes.length}銘柄</small><button title="削除">✕</button>`;
      row.querySelector(".snm").addEventListener("click", () => applySaved(it));
      row.querySelector("button").addEventListener("click", () => {
        const arr = loadSaved(); arr.splice(i, 1); localStorage.setItem(LS, JSON.stringify(arr)); renderSaved();
      });
      el.appendChild(row);
    });
  }
  function applySaved(it) {
    state.selected = new Set(it.codes.filter((c) => state.data.stocks[c]));
    state.method = it.method; state.custom = { ...it.custom };
    state.daily = it.daily || 100; state.mode = it.mode || "dca";
    document.querySelector(`input[name="wm"][value="${state.method}"]`).checked = true;
    $("#dailyAmount").value = state.daily;
    document.querySelectorAll(".mode-tab").forEach((x) => x.classList.toggle("active", x.dataset.mode === state.mode));
    buildStockList(); updateSelCount(); renderCustomPanel(); renderModeUI(); schedule();
    toast(`「${it.name}」を呼び出しました`);
  }

  // ---------- フォーマッタ ----------
  function yen(v) { return "¥" + Math.round(v).toLocaleString("ja"); }
  function signYen(v) { return (v >= 0 ? "+¥" : "−¥") + Math.abs(Math.round(v)).toLocaleString("ja"); }
  function yenShort(v) {
    if (Math.abs(v) >= 1e8) return (v / 1e8).toFixed(1) + "億";
    if (Math.abs(v) >= 1e4) return (v / 1e4).toFixed(1) + "万";
    return Math.round(v).toLocaleString("ja");
  }
  function pct(v) { return (v * 100).toFixed(1) + "%"; }
  function signPct(v) { return (v >= 0 ? "+" : "−") + Math.abs(v * 100).toFixed(1) + "%"; }

  let toastT = null;
  function toast(msg) {
    const t = $("#toast"); t.textContent = msg; t.classList.remove("hidden");
    clearTimeout(toastT); toastT = setTimeout(() => t.classList.add("hidden"), 2200);
  }
})();
</script>
</body></html>
