<style>:root{
  --bg:#0f1320; --panel:#171c2e; --panel2:#1d2336; --line:#2a3252;
  --ink:#e8ecf6; --mut:#9aa4c4; --mut2:#6b7596;
  --accent:#5b8cff; --accent2:#7c5cff;
  --up:#22c79a; --down:#ff5d6c; --warn:#f0b429;
  --shadow:0 6px 24px rgba(0,0,0,.32);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 600px at 80% -10%, #1a2140 0%, var(--bg) 55%);
  color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,-apple-system,"Segoe UI",sans-serif;
  font-size:14px; line-height:1.5; min-height:100vh;
}
h1,h2{margin:0}
button{font-family:inherit;cursor:pointer}
small{color:var(--mut)}

/* top bar */
.topbar{display:flex;justify-content:space-between;align-items:center;
  padding:14px 22px;border-bottom:1px solid var(--line);
  background:rgba(13,17,30,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:20}
.brand{display:flex;gap:13px;align-items:center}
.logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
  font-weight:800;font-size:20px;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:var(--shadow)}
.topbar h1{font-size:18px;letter-spacing:.5px}
.tag{margin:1px 0 0;color:var(--mut);font-size:12px}
.badge{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid var(--line)}
.badge-ok{background:rgba(34,199,154,.12);color:var(--up);border-color:rgba(34,199,154,.35)}
.badge-warn{background:rgba(240,180,41,.12);color:var(--warn);border-color:rgba(240,180,41,.35)}

/* layout */
.layout{display:grid;grid-template-columns:340px 1fr;gap:20px;
  max-width:1500px;margin:0 auto;padding:20px}
.sidebar{display:flex;flex-direction:column;gap:14px}
.content{display:flex;flex-direction:column;gap:18px;min-width:0}

/* mode tabs */
.mode-tabs{display:flex;gap:6px;background:var(--panel);padding:6px;border-radius:12px;border:1px solid var(--line)}
.mode-tab{flex:1;padding:10px;border:0;border-radius:8px;background:transparent;color:var(--mut);font-weight:700;font-size:13.5px}
.mode-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:var(--shadow)}
.mode-desc{margin:-4px 2px 0;color:var(--mut);font-size:12px;min-height:16px}

/* panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.panel h2{font-size:13.5px;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.panel-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.panel-head h2{margin:0}
.pill{background:var(--accent);color:#fff;border-radius:999px;font-size:11px;padding:1px 8px;font-weight:700}
.mini-btns{display:flex;gap:5px}
.mini{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:7px;padding:4px 8px;font-size:11.5px}
.mini:hover{color:var(--ink);border-color:var(--accent)}

.search,.select,.amount-input input,.save-row input{
  width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:9px;padding:9px 11px;font-size:13px;outline:none}
.search:focus,.select:focus{border-color:var(--accent)}
.select{margin-top:8px;cursor:pointer}

/* stock list */
.stocklist{margin-top:10px;max-height:260px;overflow:auto;display:flex;flex-direction:column;gap:2px;padding-right:2px}
.stock-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer}
.stock-item:hover{background:var(--panel2)}
.stock-item input{accent-color:var(--accent);width:15px;height:15px}
.stock-item .code{color:var(--mut2);font-variant-numeric:tabular-nums;font-size:12px;min-width:38px}
.stock-item .nm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stock-item .sec{font-size:10.5px;color:var(--mut2);background:var(--panel);padding:1px 6px;border-radius:5px}

/* weighting */
.weights{display:flex;flex-direction:column;gap:7px}
.wopt{display:grid;grid-template-columns:18px 1fr;gap:4px 9px;align-items:start;
  padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);cursor:pointer}
.wopt input{grid-row:span 2;accent-color:var(--accent);margin-top:2px}
.wopt b{font-size:13px}
.wopt small{grid-column:2;font-size:11px;line-height:1.35}
.wopt:has(input:checked){border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.custom-panel{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow:auto}
.custom-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.custom-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.custom-row input{width:70px;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:7px;padding:5px 7px;text-align:right}
.custom-row .pct{color:var(--mut);min-width:44px;text-align:right;font-variant-numeric:tabular-nums}

/* ranges */
.range-row{display:grid;grid-template-columns:36px 1fr auto;gap:9px;align-items:center;margin-bottom:9px}
.range-row label{color:var(--mut);font-size:12px}
.range-row input[type=range]{accent-color:var(--accent)}
.rlabel{font-size:11.5px;color:var(--ink);font-variant-numeric:tabular-nums;min-width:64px;text-align:right}
.amount-row{margin-top:6px}
.amount-row label{display:block;color:var(--mut);font-size:12px;margin-bottom:6px}
.amount-input{display:flex;align-items:center;gap:8px}
.amount-input input{width:110px;text-align:right;font-variant-numeric:tabular-nums}
.amount-input span{color:var(--mut);font-size:12px}

/* save */
.save-row{display:flex;gap:7px}
.save-row input{flex:1}
.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff;border-radius:9px;font-weight:700}
.primary.small{padding:9px 14px;font-size:12.5px;white-space:nowrap}
.saved-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.saved-item{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:12.5px}
.saved-item .snm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.saved-item .snm:hover{color:var(--accent)}
.saved-item button{background:none;border:0;color:var(--mut2);font-size:14px;padding:0 2px}
.saved-item button:hover{color:var(--down)}

/* holdings form */
.form{display:flex;flex-direction:column;gap:10px}
.form label{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--mut)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.num{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 11px;font-size:13px;outline:none;width:100%;font-variant-numeric:tabular-nums}
.num:focus{border-color:var(--accent)}
.form .primary{width:100%;padding:10px;font-size:13.5px;margin-top:2px}
.formmsg{font-size:11.5px;min-height:14px;margin:0}
.formmsg.err{color:var(--down)} .formmsg.ok{color:var(--up)}
.holdinglist{display:flex;flex-direction:column;gap:6px;max-height:360px;overflow:auto}
.holding-empty{font-size:12px;color:var(--mut2);padding:6px 2px}
.holding-item{display:grid;grid-template-columns:1fr auto;gap:2px 8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 10px}
.holding-item .h-nm{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.holding-item .h-del{grid-row:span 2;align-self:center;background:none;border:0;color:var(--mut2);font-size:16px;cursor:pointer;padding:0 2px}
.holding-item .h-del:hover{color:var(--down)}
.holding-item .h-sub{font-size:11px;color:var(--mut);grid-column:1;font-variant-numeric:tabular-nums}

/* flatpickr（日付ピッカー）をテーマ色に寄せる */
.num{color-scheme:dark}
.flatpickr-calendar{font-family:inherit;font-size:13px;border-radius:12px;box-shadow:var(--shadow)}
.flatpickr-day.selected,.flatpickr-day.selected:hover,.flatpickr-day.startRange,.flatpickr-day.endRange{
  background:var(--accent);border-color:var(--accent)}
.flatpickr-day.today{border-color:var(--accent2)}
.flatpickr-day:hover{background:var(--panel2)}
.flatpickr-months .flatpickr-month,.flatpickr-current-month{color:var(--ink)}

/* metric cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;position:relative;overflow:hidden}
.card::after{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--accent)}
.card.win::after{background:var(--up)} .card.lose::after{background:var(--down)}
.card .k{color:var(--mut);font-size:11.5px;margin-bottom:7px}
.card .v{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.card .sub{font-size:11.5px;color:var(--mut);margin-top:4px}
.up{color:var(--up)} .down{color:var(--down)}

/* chart */
.chart-card,.table-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
.chart-head,.table-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.chart-head h2,.table-head h2{font-size:15px}
.legend-note{font-size:11.5px;color:var(--mut)}
.chart-head-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.unit-toggle{display:flex;gap:4px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:3px}
.unit-toggle button{border:0;background:transparent;color:var(--mut);font-size:12px;font-weight:700;padding:5px 11px;border-radius:6px;cursor:pointer}
.unit-toggle button.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.compare-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin:2px 0 14px}
.cmp{display:flex;align-items:center;gap:9px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 14px;min-width:0}
.cmp .dot{width:10px;height:10px;border-radius:50%;background:var(--c);flex:none}
.cmp-body{display:flex;flex-direction:column;line-height:1.25;min-width:0}
.cmp-label{font-size:11.5px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmp-pct{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.3px}
.cmp-sub{font-size:11px;color:var(--mut2);font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 保有（あなた）＝色で強調（サイズは他と同じ） */
.cmp-self{border:2px solid var(--accent);background:rgba(91,140,255,.14)}
.cmp-self .cmp-label{color:#9fb8ff;font-weight:700}
.cmp-self .cmp-sub{color:#8aa6e6}
.stat-line{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--mut)}
.stat-line span b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;margin-left:5px}
.chart-wrap{position:relative;height:380px}

/* table */
.table-scroll{overflow:auto;max-height:420px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{position:sticky;top:0;background:var(--panel);text-align:right;color:var(--mut);font-weight:700;
  padding:9px 10px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none}
thead th:first-child,tbody td:first-child{text-align:left}
thead th.s-asc::after{content:" ▲";color:var(--accent)}
thead th.s-desc::after{content:" ▼";color:var(--accent)}
tbody td{padding:8px 10px;border-bottom:1px solid rgba(42,50,82,.5);text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:var(--panel2)}
.bar{height:6px;border-radius:3px;background:var(--accent);display:inline-block;vertical-align:middle;margin-left:6px}

.hint{font-size:11px;color:var(--mut2)}
.disclaimer{font-size:11px;color:var(--mut2);line-height:1.6;margin:4px 2px 24px}
.hidden{display:none!important}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--accent);color:var(--ink);
  padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);z-index:50;font-size:13px}

/* 撮影モード（スクショ向け：入力欄・表を隠してチップ＋チャートだけ） */
.shot-btn{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:999px;
  padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.shot-btn:hover{color:var(--ink);border-color:var(--accent)}
body.shot-mode .shot-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
body.shot-mode .sidebar,
body.shot-mode .table-card,
body.shot-mode .disclaimer,
body.shot-mode .unit-toggle,
body.shot-mode #chartLegendNote{display:none!important}
body.shot-mode .layout{display:block;max-width:560px;margin:0 auto}
body.shot-mode .chart-card{padding:20px}
body.shot-mode .chart-wrap{height:300px}

/* responsive */
@media(max-width:980px){
  .layout{grid-template-columns:1fr}
  .sidebar{order:2}
  .chart-wrap{height:320px}
}
@media(max-width:600px){
  .topbar{padding:10px 13px;gap:8px}
  .topbar h1{font-size:15.5px}
  .tag{display:none}
  .logo{width:34px;height:34px;font-size:17px}
  .shot-btn{padding:5px 9px;font-size:11px}
  .badge{font-size:10.5px;padding:4px 8px}
  .layout{padding:12px;gap:13px}
  .panel,.chart-card,.table-card{padding:13px}
  .chart-wrap{height:240px}
  .compare-strip{grid-template-columns:repeat(2,1fr);gap:8px}
  .cmp{padding:8px 10px;gap:7px}
  .cmp-pct{font-size:16px}
  .cmp-sub{font-size:10px}
  .stat-line{gap:10px 14px;font-size:11px}
}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}
::-webkit-scrollbar-thumb:hover{background:var(--mut2)}
</style>
</head><body>

<header class="topbar">
  <div class="brand">
    <span class="logo">保</span>
    <div>
      <h1>保有トラッカー</h1>
      <p class="tag">自分の保有株を、日経225・S&P500と毎日比べる</p>
    </div>
  </div>
  <div class="topbar-right">
    <button id="btnShot" class="shot-btn" title="入力欄や表を隠してスクショ向け表示に切替">📷 撮影モード</button>
    <span id="dataBadge" class="badge badge-warn">データ読込中…</span>
  </div>
</header>

<main class="layout">
  <!-- ============ サイドバー（保有の入力）============ -->
  <aside class="sidebar">
    <section class="panel">
      <h2>① 保有を追加</h2>
      <div class="form">
        <label>銘柄
          <input id="inTicker" class="search" list="tickerList" placeholder="銘柄名・コードで検索（例: トヨタ / 7203）" autocomplete="off" />
          <datalist id="tickerList"></datalist>
        </label>
        <div class="form-row">
          <label>株式数
            <input id="inShares" class="num" type="number" min="0" step="any" placeholder="100" inputmode="decimal" />
          </label>
          <label>取得単価(円)
            <input id="inCost" class="num" type="number" min="0" step="0.1" placeholder="2500" />
          </label>
        </div>
        <label>取得日
          <input id="inDate" class="num" type="text" placeholder="日付を選ぶ" />
          <span class="hint" style="font-size:11px">実際に買った日付。過去ほどチャートが長く出ます</span>
        </label>
        <button id="btnAdd" class="primary">保有を追加</button>
        <p id="formMsg" class="formmsg"></p>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>② 保有一覧 <span id="holdCount" class="pill">0</span></h2>
        <div class="mini-btns">
          <button id="btnSample" class="mini">サンプル投入</button>
          <button id="btnClearAll" class="mini">全消去</button>
        </div>
      </div>
      <div id="holdingList" class="holdinglist"></div>
      <p class="hint" style="margin-top:8px">保有データはこのブラウザ内だけに保存され、公開サイトには出ません（非公開）。</p>
    </section>
  </aside>

  <!-- ============ メイン（結果）============ -->
  <section class="content">
    <div class="chart-card">
      <div class="chart-head">
        <h2 id="chartTitle">評価額の推移</h2>
        <div class="chart-head-right">
          <div class="unit-toggle" id="unitToggle">
            <button data-unit="pct" class="active">リターン%</button>
            <button data-unit="abs">評価額</button>
          </div>
          <span id="chartLegendNote" class="legend-note"></span>
        </div>
      </div>
      <div id="compareStrip" class="compare-strip"></div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      <div id="statLine" class="stat-line"></div>
    </div>

    <div class="table-card">
      <div class="table-head">
        <h2>保有の内訳</h2>
        <div class="table-tools"><span class="hint">列見出しクリックで並び替え</span></div>
      </div>
      <div class="table-scroll">
        <table id="holdingsTable"><thead></thead><tbody></tbody></table>
      </div>
    </div>

    <p class="disclaimer" id="disclaimer"></p>
  </section>
</main>

<div id="toast" class="toast hidden"></div>

<script>/*
 * engine.js — 指数/積立シミュレーションの純粋計算部（DOM非依存）。
 * ブラウザでは window.Engine、Node では require('./engine.js') で使える（UMD）。
 * ここに副作用は置かない。テスト(verify.cjs)はこのファイルを直接importして検証する。
 */
(function (root) {
  "use strict";

  // ---- 小道具 -----------------------------------------------------------
  function priceAt(data, code, t) {
    const v = data.stocks[code].close[t];
    return (v === null || v === undefined || v <= 0) ? null : v;
  }

  // ある日 t に有効な（株価が取れる）銘柄だけ返す
  function availableCodes(data, codes, t) {
    return codes.filter((c) => priceAt(data, c, t) !== null);
  }

  // 目標ウェイト（合計1）。method: 'equal' | 'price' | 'mktcap' | 'custom'
  // pricesT: その日の {code: price}, custom: {code: weight}
  function targetWeights(method, codes, pricesT, sharesMap, custom) {
    const raw = {};
    let sum = 0;
    for (const c of codes) {
      let w;
      if (method === "equal") w = 1;
      else if (method === "price") w = pricesT[c];
      else if (method === "mktcap") w = pricesT[c] * (sharesMap[c] || 0);
      else if (method === "custom") w = Math.max(0, (custom && custom[c]) || 0);
      else w = 1;
      raw[c] = w;
      sum += w;
    }
    const out = {};
    if (sum <= 0) {
      // 全部0（カスタムで未指定など）→ 均等にフォールバック
      for (const c of codes) out[c] = 1 / codes.length;
      return out;
    }
    for (const c of codes) out[c] = raw[c] / sum;
    return out;
  }

  // ---- 指数モード：毎日リバランスする加重リターン指数（始点=100）---------
  // 各ベンチ（日経225・S&P500…）も同じ始点=100に正規化して比較。
  function computeIndexSeries(data, codes, method, custom, i0, i1) {
    const dates = data.dates.slice(i0, i1 + 1);
    const bl = benchmarksOf(data);
    const level = [100];
    const benchLv = bl.map(() => [100]);
    const shMap = sharesMapOf(data);
    for (let t = i0 + 1; t <= i1; t++) {
      // 前日 t-1 の価格で目標ウェイトを決め、t のリターンを取る（両日とも価格がある銘柄のみ）
      const valid = codes.filter(
        (c) => priceAt(data, c, t - 1) !== null && priceAt(data, c, t) !== null
      );
      let ret = 0;
      if (valid.length) {
        const pPrev = {};
        for (const c of valid) pPrev[c] = priceAt(data, c, t - 1);
        const w = targetWeights(method, valid, pPrev, shMap, custom);
        for (const c of valid) {
          const r = priceAt(data, c, t) / priceAt(data, c, t - 1) - 1;
          ret += w[c] * r;
        }
      }
      level.push(level[level.length - 1] * (1 + ret));
      bl.forEach((b, k) => {
        const br = b.close[t] && b.close[t - 1] ? b.close[t] / b.close[t - 1] - 1 : 0;
        benchLv[k].push(benchLv[k][benchLv[k].length - 1] * (1 + br));
      });
    }
    const benches = bl.map((b, k) => ({ sym: b.sym, name: b.name, level: benchLv[k] }));
    return { dates, level, benches };
  }

  // ---- 積立モード：毎日 daily 円を目標ウェイトで購入（DCA）---------------
  function computeDCASeries(data, codes, method, custom, daily, i0, i1) {
    const dates = data.dates.slice(i0, i1 + 1);
    const bl = benchmarksOf(data);
    const sharesHeld = {};
    const investedInCode = {};
    for (const c of codes) {
      sharesHeld[c] = 0;
      investedInCode[c] = 0;
    }
    const benchUnits = bl.map(() => 0);
    const benchAssetsArr = bl.map(() => []);
    let invested = 0;
    const asset = [];
    const investedArr = [];
    const shMap = sharesMapOf(data);

    for (let t = i0; t <= i1; t++) {
      const valid = availableCodes(data, codes, t);
      const pricesT = {};
      for (const c of valid) pricesT[c] = priceAt(data, c, t);
      const w = targetWeights(method, valid, pricesT, shMap, custom);
      for (const c of valid) {
        const amt = daily * w[c];
        sharesHeld[c] += amt / pricesT[c];
        investedInCode[c] += amt;
      }
      invested += daily;
      bl.forEach((b, k) => { if (b.close[t]) benchUnits[k] += daily / b.close[t]; });

      let v = 0;
      for (const c of codes) {
        const p = priceAt(data, c, t);
        if (p !== null) v += sharesHeld[c] * p;
      }
      asset.push(v);
      investedArr.push(invested);
      bl.forEach((b, k) => benchAssetsArr[k].push(benchUnits[k] * (b.close[t] || 0)));
    }
    const benchAssets = bl.map((b, k) => ({ sym: b.sym, name: b.name, asset: benchAssetsArr[k] }));

    // 銘柄ごとの最終内訳
    const perStock = codes.map((c) => {
      const p = priceAt(data, c, i1);
      const sh = sharesHeld[c];
      const inv = investedInCode[c];
      const value = p !== null ? sh * p : 0;
      return {
        code: c,
        name: data.stocks[c].name,
        sector: data.stocks[c].sector,
        invested: inv,          // 累計投資額（このカスタム比率で毎日積んだ合計）
        shares: sh,             // 保有株数（端株あり）
        price: p,               // 現在値
        avgCost: sh > 0 ? inv / sh : 0,   // 取得単価＝投資額÷株数（DCA平均）
        value,                  // 評価額＝株数×現在値
        pl: value - inv,        // 含み損益
        ret: inv > 0 ? value / inv - 1 : 0, // 損益率＝現在値/取得単価−1 と同じ
      };
    });

    return { dates, asset, invested: investedArr, benchAssets, perStock };
  }

  // ---- 指標 -------------------------------------------------------------
  function maxDrawdown(series) {
    let peak = -Infinity, mdd = 0, peakIdx = 0, troughIdx = 0, curPeak = 0;
    for (let i = 0; i < series.length; i++) {
      const v = series[i];
      if (v > peak) { peak = v; curPeak = i; }
      const dd = (v - peak) / peak;
      if (dd < mdd) { mdd = dd; peakIdx = curPeak; troughIdx = i; }
    }
    return { mdd, peakIdx, troughIdx };
  }

  function cagr(first, last, nDays) {
    if (first <= 0 || nDays <= 1) return 0;
    return Math.pow(last / first, 252 / (nDays - 1)) - 1;
  }

  function annualVol(level) {
    const rets = [];
    for (let i = 1; i < level.length; i++) rets.push(level[i] / level[i - 1] - 1);
    if (rets.length < 2) return 0;
    const m = rets.reduce((a, b) => a + b, 0) / rets.length;
    const v = rets.reduce((a, b) => a + (b - m) * (b - m), 0) / (rets.length - 1);
    return Math.sqrt(v) * Math.sqrt(252);
  }

  // 積立の年率リターン（資金加重・IRR）。毎日 -daily、最終日に +finalValue。
  function irrAnnual(daily, finalValue, n) {
    if (finalValue <= 0 || n < 2) return 0;
    const npv = (r) => {
      let s = 0;
      for (let t = 0; t < n; t++) s += -daily / Math.pow(1 + r, t);
      s += finalValue / Math.pow(1 + r, n - 1);
      return s;
    };
    let lo = -0.5, hi = 0.5; // 日次レート
    if (npv(lo) < 0 && npv(hi) < 0) return -1;
    for (let i = 0; i < 200; i++) {
      const mid = (lo + hi) / 2;
      const val = npv(mid);
      if (Math.abs(val) < 1e-6) { lo = hi = mid; break; }
      if (val > 0) lo = mid; else hi = mid;
    }
    const rDaily = (lo + hi) / 2;
    return Math.pow(1 + rDaily, 252) - 1;
  }

  // ---- 内部 -------------------------------------------------------------
  function sharesMapOf(data) {
    const m = {};
    for (const c in data.stocks) m[c] = data.stocks[c].shares || 0;
    return m;
  }

  // ベンチマーク一覧を取り出す（新スキーマ benchmarks{} / 旧 benchmark{} 両対応）
  function benchmarksOf(data) {
    if (data.benchmarks) {
      return Object.keys(data.benchmarks).map((sym) => ({
        sym, name: data.benchmarks[sym].name, close: data.benchmarks[sym].close,
      }));
    }
    if (data.benchmark) {
      return [{ sym: data.benchmark.symbol, name: data.benchmark.name, close: data.benchmark.close }];
    }
    return [];
  }

  // ---- 保有ポートフォリオ評価 ----------------------------------------------
  // 取得日(dstr)が入る営業日インデックス（その日以降で最初の営業日）。
  function dateIndex(dates, dstr) {
    if (!dstr || dstr <= dates[0]) return 0;
    for (let t = 0; t < dates.length; t++) if (dates[t] >= dstr) return t;
    return dates.length - 1;
  }

  // holdings: [{code, shares, cost(取得単価), date(取得日 YYYY-MM-DD)}]
  // 返すもの: 評価額・累計元本・各ベンチ「同じ資金を同じ日に入れた場合」の価値（時系列）。
  function computePortfolio(data, holdings) {
    const dates = data.dates;
    const benches = benchmarksOf(data);
    const H = holdings
      .filter((h) => data.stocks[h.code] && h.shares > 0)
      .map((h) => {
        const ei = dateIndex(dates, h.date);
        return { ...h, ei, bEntry: benches.map((b) => b.close[ei]) };
      });
    if (!H.length) return null;

    const i0 = Math.min(...H.map((h) => h.ei));
    const i1 = dates.length - 1;
    const value = [], cost = [];
    const benchVals = benches.map(() => []);

    for (let t = i0; t <= i1; t++) {
      let v = 0, c = 0;
      const bv = benches.map(() => 0);
      for (const h of H) {
        if (h.ei > t) continue; // まだ取得していない
        const invested = h.shares * h.cost;
        c += invested;
        const p = priceAt(data, h.code, t);
        if (p !== null) v += h.shares * p;
        benches.forEach((b, k) => {
          const be = h.bEntry[k], bt = b.close[t];
          if (be && bt) bv[k] += invested * (bt / be); // 同額・同日に指数へ入れたら
        });
      }
      value.push(v); cost.push(c);
      benches.forEach((b, k) => benchVals[k].push(bv[k]));
    }

    const perHolding = H.map((h) => {
      const p = priceAt(data, h.code, i1);
      const invested = h.shares * h.cost;
      const val = p !== null ? h.shares * p : 0;
      return {
        code: h.code, name: data.stocks[h.code].name, sector: data.stocks[h.code].sector,
        shares: h.shares, cost: h.cost, date: h.date, price: p,
        invested, value: val, pl: val - invested,
        ret: invested > 0 ? val / invested - 1 : 0,
      };
    });

    return {
      dates: dates.slice(i0, i1 + 1),
      value, cost,
      benches: benches.map((b, k) => ({ sym: b.sym, name: b.name, value: benchVals[k] })),
      perHolding, i0, i1,
    };
  }

  const Engine = {
    priceAt, availableCodes, targetWeights, benchmarksOf, dateIndex,
    computeIndexSeries, computeDCASeries, computePortfolio,
    maxDrawdown, cagr, annualVol, irrAnnual,
  };

  if (typeof module !== "undefined" && module.exports) module.exports = Engine;
  root.Engine = Engine;
})(typeof globalThis !== "undefined" ? globalThis : this);
</script>
<script>/* app.js — 保有トラッカー。engine.js(window.Engine) と Chart.js を使う。 */
(function () {
  "use strict";
  const $ = (s) => document.querySelector(s);
  const LS = "jpidx.holdings.v1";
  const SELF_COLOR = "--accent";
  // 日経=amber, S&P=purple, NASDAQ=teal, NASDAQ100=blue, FANG+=pink, 予備=red
  const BENCH_COLORS = ["#f0b429", "#7c5cff", "#22c79a", "#5b8cff", "#e0567c", "#ff5d6c"];

  const state = { data: null, holdings: [], unit: "pct" };
  let chart = null, rafId = null;

  // ---------- 起動 ----------
  if (window.__PRICES__) init(window.__PRICES__);
  else {
    fetch("data/prices.json", { cache: "no-store" })
      .then((r) => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(init)
      .catch((e) => {
        $("#dataBadge").textContent = "データ読込失敗: data/prices.json";
        $("#dataBadge").className = "badge badge-warn";
        console.error(e);
      });
  }

  function init(data) {
    state.data = data;
    const badge = $("#dataBadge");
    if (data.source && data.source !== "SAMPLE") {
      const nm = { yahoo: "Yahoo Finance", stooq: "stooq" }[data.source] || data.source;
      badge.textContent = `実データ ${nm}・${data.end} 時点`;
      badge.className = "badge badge-ok";
    } else {
      badge.textContent = "サンプルデータ（実データは fetch_data.py で取得）";
      badge.className = "badge badge-warn";
    }

    buildDatalist();
    // 既定の取得日＝当日（ローカル時刻のYYYY-MM-DD）
    const defaultDate = new Date().toLocaleDateString("sv-SE");
    $("#inDate").value = defaultDate;
    if (window.flatpickr) {
      const loc = (window.flatpickr.l10ns && window.flatpickr.l10ns.ja) || "default";
      window.flatpickr("#inDate", {
        dateFormat: "Y-m-d", locale: loc,
        minDate: data.start, maxDate: "today", defaultDate, disableMobile: true,
      });
    }
    state.holdings = loadHoldings();

    wireEvents();
    $("#disclaimer").innerHTML =
      "※ 配当・売買手数料・税金は考慮していません。評価額＝株数×終値。日経225・S&P500のラインは" +
      "「同じ資金を同じ取得日に各指数へ入れていたら」の価値で、あなたの保有がそれを上回れば指数超えです。" +
      "S&P500は現地通貨(USD)指数で為替は未考慮。発行株数等の概算あり。本ツールは情報提供のみ・投資助言ではありません。";
    renderHoldingList();
    schedule();
  }

  function buildDatalist() {
    const dl = $("#tickerList");
    const codes = Object.keys(state.data.stocks).sort();
    dl.innerHTML = codes.map((c) => `<option value="${c} ${state.data.stocks[c].name}"></option>`).join("");
  }

  // 入力文字列から証券コードを解決
  function resolveCode(input) {
    const s = (input || "").trim();
    // 先頭トークン（datalistは "コード 名称" 形式なのでコードが先頭）
    const first = s.split(/\s+/)[0].toUpperCase();
    if (state.data.stocks[first]) return first;
    // 4桁数字コード
    const m = s.match(/\d{4}/);
    if (m && state.data.stocks[m[0]]) return m[0];
    // 新形式の英数字コード（例: 285A）
    const m2 = s.toUpperCase().match(/\b\d{3}[0-9A-Z]\b/);
    if (m2 && state.data.stocks[m2[0]]) return m2[0];
    // 名前一致
    if (s.length >= 2) {
      for (const c in state.data.stocks) if (state.data.stocks[c].name === s) return c;
      for (const c in state.data.stocks) if (state.data.stocks[c].name.includes(s)) return c;
    }
    return null;
  }

  // ---------- 保有の追加・保存 ----------
  function loadHoldings() { try { return JSON.parse(localStorage.getItem(LS)) || []; } catch { return []; } }
  function saveHoldings() { localStorage.setItem(LS, JSON.stringify(state.holdings)); }

  function addHolding() {
    const msg = $("#formMsg");
    const code = resolveCode($("#inTicker").value);
    const shares = parseFloat($("#inShares").value);
    const cost = parseFloat($("#inCost").value);
    const date = $("#inDate").value || state.data.end;
    if (!code) { msg.className = "formmsg err"; msg.textContent = "銘柄が見つかりません（収録外なら jp_universe.py に追加→再取得）"; return; }
    if (!(shares > 0)) { msg.className = "formmsg err"; msg.textContent = "株式数を入力してください"; return; }
    if (!(cost > 0)) { msg.className = "formmsg err"; msg.textContent = "取得単価を入力してください"; return; }
    state.holdings.push({ code, shares, cost, date });
    saveHoldings();
    msg.className = "formmsg ok";
    msg.textContent = `${state.data.stocks[code].name} を追加しました`;
    $("#inTicker").value = ""; $("#inShares").value = ""; $("#inCost").value = "";
    renderHoldingList(); schedule();
  }

  function renderHoldingList() {
    $("#holdCount").textContent = state.holdings.length;
    const el = $("#holdingList");
    if (!state.holdings.length) {
      el.innerHTML = '<div class="holding-empty">まだ保有がありません。上で追加するか「サンプル投入」を押してください。</div>';
      return;
    }
    el.innerHTML = "";
    state.holdings.forEach((h, i) => {
      const nm = state.data.stocks[h.code] ? state.data.stocks[h.code].name : h.code;
      const row = document.createElement("div");
      row.className = "holding-item";
      row.innerHTML =
        `<span class="h-nm">${h.code} ${nm}</span>` +
        `<button class="h-del" title="削除">✕</button>` +
        `<span class="h-sub">${fmtShares(h.shares)}株 × ¥${Math.round(h.cost).toLocaleString()} ・ ${h.date}</span>`;
      row.querySelector(".h-del").addEventListener("click", () => {
        state.holdings.splice(i, 1); saveHoldings(); renderHoldingList(); schedule();
      });
      el.appendChild(row);
    });
  }

  function loadSample() {
    const E = window.Engine, d = state.data;
    const idx = Math.max(0, d.dates.length - 500); // 約2年前
    const date = d.dates[idx];
    const picks = ["7203", "6758", "9984", "8035", "9432"].filter((c) => d.stocks[c]);
    state.holdings = picks.map((c) => ({
      code: c, shares: 100,
      cost: Math.round((E.priceAt(d, c, idx) || 1000) * 100) / 100,
      date,
    }));
    saveHoldings(); renderHoldingList(); schedule();
    toast("サンプル保有を入れました（約2年前に各100株購入の想定）");
  }

  // ---------- イベント ----------
  function wireEvents() {
    $("#btnAdd").addEventListener("click", addHolding);
    $("#inCost").addEventListener("keydown", (e) => { if (e.key === "Enter") addHolding(); });
    $("#btnSample").addEventListener("click", loadSample);
    $("#btnClearAll").addEventListener("click", () => {
      if (!state.holdings.length) return;
      state.holdings = []; saveHoldings(); renderHoldingList(); schedule();
    });
    document.querySelectorAll("#unitToggle button").forEach((b) =>
      b.addEventListener("click", () => {
        state.unit = b.dataset.unit;
        document.querySelectorAll("#unitToggle button").forEach((x) => x.classList.toggle("active", x === b));
        schedule();
      })
    );
    $("#btnShot").addEventListener("click", () => {
      const on = document.body.classList.toggle("shot-mode");
      $("#btnShot").textContent = on ? "✓ 通常に戻す" : "📷 撮影モード";
      setTimeout(() => { if (chart) chart.resize(); }, 60); // レイアウト変化にチャートを合わせる
    });
  }

  // ---------- 計算＆描画 ----------
  function schedule() { if (rafId) cancelAnimationFrame(rafId); rafId = requestAnimationFrame(run); }

  function run() {
    const E = window.Engine;
    const pf = state.holdings.length ? E.computePortfolio(state.data, state.holdings) : null;
    if (!pf) { renderEmpty(); return; }
    const n = pf.value.length;
    const costF = pf.cost[n - 1], valF = pf.value[n - 1];
    const pRet = costF > 0 ? valF / costF - 1 : 0;

    let wins = 0;
    const benchChips = pf.benches.map((b, k) => {
      const bRet = costF > 0 ? b.value[n - 1] / costF - 1 : 0;
      if (pRet > bRet) wins++;
      return { label: b.name, color: col(BENCH_COLORS[k % BENCH_COLORS.length]), pct: bRet, sub: ppGap(pRet - bRet) };
    });
    const selfChip = {
      label: "保有（あなた）", color: col(SELF_COLOR), pct: pRet,
      sub: `${wins}/${pf.benches.length} 指数に勝ち`,
    };
    renderCompare([selfChip, ...benchChips]);
    renderStatLine([
      ["投資額", yen(costF)], ["評価額", yen(valF)], ["含み損益", signYen(valF - costF)],
      ["損益率", signPct(pRet)], ["期間", `${n.toLocaleString()}営業日`],
    ]);

    let datasets, yFmt, note;
    if (state.unit === "pct") {
      const toPct = (arr) => arr.map((v, i) => (pf.cost[i] > 0 ? (v / pf.cost[i] - 1) * 100 : 0));
      datasets = [line("保有", toPct(pf.value), SELF_COLOR, false)];
      pf.benches.forEach((b, k) => datasets.push(line(b.name, toPct(b.value), BENCH_COLORS[k % BENCH_COLORS.length], false)));
      yFmt = (v) => (v >= 0 ? "+" : "") + v.toFixed(0) + "%";
      note = "元本に対するリターン％（同じ資金を同じ取得日に各指数へ入れた場合と比較）";
    } else {
      datasets = [line("保有評価額", pf.value, SELF_COLOR, false), line("投資元本", pf.cost, "--mut2", true)];
      pf.benches.forEach((b, k) => datasets.push(line(`${b.name}に同額`, b.value, BENCH_COLORS[k % BENCH_COLORS.length], false)));
      yFmt = (v) => yenShort(v);
      note = "実線=評価額／点線=投じた元本";
    }
    try { drawChart(pf.dates, datasets, yFmt); $("#chartLegendNote").textContent = note; }
    catch (e) { console.error("chart error", e); }
    renderHoldingsTable(pf, valF);
  }

  function renderEmpty() {
    $("#compareStrip").innerHTML = '<div class="cmp"><span class="dot" style="--c:var(--mut2)"></span><div class="cmp-body"><span class="cmp-label">保有未入力</span><span class="cmp-sub">左で保有を追加してください</span></div></div>';
    $("#statLine").innerHTML = "";
    $("#holdingsTable").querySelector("thead").innerHTML = "";
    $("#holdingsTable").querySelector("tbody").innerHTML = "";
    if (chart) { chart.destroy(); chart = null; }
  }

  // ---------- 比較チップ・統計行 ----------
  function renderCompare(items) {
    $("#compareStrip").innerHTML = items.map((it, i) =>
      `<div class="cmp${i === 0 ? " cmp-self" : ""}"><span class="dot" style="--c:${it.color}"></span>` +
      `<div class="cmp-body"><span class="cmp-label">${it.label}</span>` +
      `<span class="cmp-pct ${it.pct >= 0 ? "up" : "down"}">${signPct(it.pct)}</span>` +
      `<span class="cmp-sub">${it.sub || ""}</span></div></div>`
    ).join("");
  }
  function renderStatLine(pairs) {
    $("#statLine").innerHTML = pairs.map(([k, v]) => `<span>${k}<b>${v}</b></span>`).join("");
  }
  function ppGap(d) { return "保有と " + (d >= 0 ? "+" : "−") + Math.abs(d * 100).toFixed(2) + "%pt"; }

  // ---------- チャート ----------
  function cssVar(name) { return getComputedStyle(document.body).getPropertyValue(name).trim(); }
  function col(c) { return c && c.charAt(0) === "-" ? cssVar(c) : c; } // 変数名(--x)なら解決、hexはそのまま
  function line(label, data, c, dashed) { return { label, data, color: col(c), dashed }; }
  function drawChart(dates, lines, yFmt) {
    const pr = dates.length <= 4 ? 3 : 0; // 点が少ない時は見えるように丸を出す
    const datasets = lines.map((l) => ({
      label: l.label, data: l.data, borderColor: l.color, backgroundColor: l.color + "22",
      borderWidth: l.dashed ? 1.5 : 2, borderDash: l.dashed ? [5, 4] : [], pointRadius: pr, tension: 0.08, fill: false,
    }));
    const opts = {
      responsive: true, maintainAspectRatio: false, animation: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { labels: { color: cssVar("--mut"), boxWidth: 14, font: { size: 12 } } },
        tooltip: { callbacks: { title: (it) => dates[it[0].dataIndex], label: (it) => `${it.dataset.label}: ${yFmt(it.parsed.y)}` } },
      },
      scales: {
        x: { ticks: { color: cssVar("--mut2"), maxTicksLimit: 8, autoSkip: true }, grid: { color: "rgba(42,50,82,.35)" } },
        y: { ticks: { color: cssVar("--mut2"), callback: yFmt }, grid: { color: "rgba(42,50,82,.35)" } },
      },
    };
    if (chart) { chart.data.labels = dates; chart.data.datasets = datasets; chart.options = opts; chart.update(); }
    else chart = new Chart($("#mainChart"), { type: "line", data: { labels: dates, datasets }, options: opts });
  }

  // ---------- 保有テーブル ----------
  let sortKey = "value", sortDir = -1;
  function renderHoldingsTable(pf, total) {
    const rows = pf.perHolding.map((r) => ({ ...r, weight: total > 0 ? r.value / total : 0 }));
    const cols = [
      ["code", "コード"], ["name", "銘柄"], ["shares", "株数"], ["cost", "取得単価"], ["date", "取得日"],
      ["price", "現在値"], ["value", "評価額"], ["pl", "含み損益"], ["ret", "損益率"], ["weight", "比率"],
    ];
    rows.sort((a, b) => {
      const x = a[sortKey], y = b[sortKey];
      if (typeof x === "string") return sortDir * String(x).localeCompare(String(y), "ja");
      return sortDir * ((x || 0) - (y || 0));
    });
    const thead = cols.map(([k, l]) => `<th data-k="${k}" class="${sortKey === k ? (sortDir < 0 ? "s-desc" : "s-asc") : ""}">${l}</th>`).join("");
    $("#holdingsTable").querySelector("thead").innerHTML = `<tr>${thead}</tr>`;
    const maxW = Math.max(...rows.map((r) => r.weight), 0.0001);
    $("#holdingsTable").querySelector("tbody").innerHTML = rows.map((r) =>
      `<tr><td class="code">${r.code}</td><td style="text-align:left">${r.name}</td>` +
      `<td>${fmtShares(r.shares)}</td><td>${yen(r.cost)}</td><td>${r.date}</td>` +
      `<td>${r.price !== null ? yen(r.price) : "—"}</td><td>${yen(r.value)}</td>` +
      `<td class="${r.pl >= 0 ? "up" : "down"}">${signYen(r.pl)}</td>` +
      `<td class="${r.ret >= 0 ? "up" : "down"}">${signPct(r.ret)}</td>` +
      `<td>${(r.weight * 100).toFixed(1)}%<span class="bar" style="width:${(r.weight / maxW * 44).toFixed(0)}px"></span></td></tr>`
    ).join("");
    $("#holdingsTable").querySelectorAll("thead th").forEach((th) =>
      th.addEventListener("click", () => {
        const k = th.dataset.k;
        if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
        renderHoldingsTable(pf, total);
      })
    );
  }

  // ---------- フォーマッタ ----------
  function yen(v) { return "¥" + Math.round(v).toLocaleString("ja"); }
  function signYen(v) { return (v >= 0 ? "+¥" : "−¥") + Math.abs(Math.round(v)).toLocaleString("ja"); }
  function yenShort(v) {
    if (Math.abs(v) >= 1e8) return (v / 1e8).toFixed(2) + "億";
    if (Math.abs(v) >= 1e4) return (v / 1e4).toFixed(1) + "万";
    return Math.round(v).toLocaleString("ja");
  }
  function pct(v) { return (v * 100).toFixed(2) + "%"; }
  function signPct(v) { return (v >= 0 ? "+" : "−") + Math.abs(v * 100).toFixed(2) + "%"; }
  // 株数: 整数はそのまま、小数はフル桁(最大8桁)で表示
  function fmtShares(v) { return Number.isInteger(v) ? v.toLocaleString("ja") : v.toLocaleString("ja", { maximumFractionDigits: 8 }); }

  let toastT = null;
  function toast(msg) {
    const t = $("#toast"); t.textContent = msg; t.classList.remove("hidden");
    clearTimeout(toastT); toastT = setTimeout(() => t.classList.add("hidden"), 2400);
  }
})();
</script>
</body></html>
